<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>


:root {
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --success: #16a34a;
  --danger: #dc2626;
  --warning: #f97316;
  --bg: #f3f6fb;
  --card: #ffffff;
  --text: #0f172a;
  --muted: #64748b;

  --radius: 16px;
  --shadow: 0 10px 25px rgba(0,0,0,0.08);
  --shadow-soft: 0 4px 12px rgba(0,0,0,0.06);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background: var(--bg);
  color: var(--text);
}

/* HEADER (POS STYLE) */
.header {
  position: sticky;
  top: 0;
  z-index: 1000;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  padding: 14px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  box-shadow: var(--shadow);
}

.header img {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: white;
  padding: 3px;
}

/* APP CONTAINER */
.container {
  max-width: 520px;
  margin: auto;
  padding: 16px;
}

/* ================================
   DASHBOARD CARDS (NEW)
================================ */
.dashboard {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}

.dash-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 12px;
  box-shadow: var(--shadow-soft);
  text-align: center;
}

.dash-title {
  font-size: 11px;
  color: var(--muted);
}

.dash-value {
  font-size: 16px;
  font-weight: 700;
  margin-top: 4px;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: var(--radius);
  border: 1px solid #e2e8f0;
  font-size: 15px;
  background: white;
  outline: none;
  transition: 0.2s;
}

input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
}

/* BUTTONS */
button {
  width: 100%;
  margin-top: 10px;
  padding: 14px;
  border: none;
  border-radius: var(--radius);
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s ease;
  box-shadow: var(--shadow-soft);
}

button:active {
  transform: scale(0.98);
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
}

.btn-danger {
  background: linear-gradient(135deg, var(--danger), #b91c1c);
  color: white;
}

.btn-warning {
  background: linear-gradient(135deg, var(--warning), #ea580c);
  color: white;
}

/* ================================
   SCANNER BOX
================================ */
#reader {
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  margin-top: 10px;
}

/* ================================
   RESULT CARD (MAIN FOCUS)
================================ */
.card {
  background: white;
  border-radius: var(--radius);
  padding: 16px;
  margin-top: 12px;
  box-shadow: var(--shadow-soft);
  transition: 0.2s ease;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

/* STATUS LEFT BAR */
.green {
  border-left: 6px solid var(--success);
}

.red {
  border-left: 6px solid var(--danger);
}

/* ================================
   STATUS CHIPS (NEW)
================================ */
.chip {
  display: inline-block;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 8px;
}

.chip-success {
  background: rgba(22,163,74,0.12);
  color: var(--success);
}

.chip-danger {
  background: rgba(220,38,38,0.12);
  color: var(--danger);
}

.chip-warning {
  background: rgba(249,115,22,0.12);
  color: var(--warning);
}

/* ================================
   LOADING STATE
================================ */
.saving {
  text-align: center;
  padding: 26px;
  border-radius: var(--radius);
  background: linear-gradient(135deg, #e0f2fe, #ffffff);
  box-shadow: var(--shadow-soft);
}

.spinner {
  width: 34px;
  height: 34px;
  margin: auto;
  border: 4px solid #dbeafe;
  border-top: 4px solid var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ================================
   EMPTY STATE
================================ */
.no-results {
  text-align: center;
  padding: 18px;
  border-radius: var(--radius);
  background: white;
  color: var(--muted);
  box-shadow: var(--shadow-soft);
  font-weight: 600;
  margin-top: 12px;
}

/* ================================
   SCAN ANIMATION
================================ */
.scan-animate {
  animation: pop 0.25s ease-out, glow 1s ease;
}

@keyframes pop {
  from { transform: scale(0.92); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes glow {
  0% { box-shadow: 0 0 0 rgba(22,163,74,0); }
  50% { box-shadow: 0 0 18px rgba(22,163,74,0.5); }
  100% { box-shadow: 0 0 0 rgba(22,163,74,0); }
}

/* ================================
   LOGIN SCREEN
================================ */
#loginScreen {
  background: #f3f6fb;
}


</style>
</head>

<body>


<div id="loginScreen" style="
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:#eef2f7;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
">

  <h2>🔐 SYSTEM LOGIN</h2>

  <input id="password" type="password" placeholder="Enter Password"
    style="padding:14px; width:80%; max-width:300px; border-radius:10px; border:none;">

  <button class="btn-blue" style="width:80%; max-width:300px;" onclick="login()">
    LOGIN
  </button>

  <p id="loginStatus"></p>
</div>


<div id="app" style="display:none;">

  <div class="header">
    <img src="https://drive.google.com/thumbnail?id=1U9kmQ7qummOCpVppdLtmVaugMuzLYUWQ&sz=w200">
    <h3 style="margin:0;">GAISANO ILOILO BRANCH</h3>
  </div>

  <div class="container">

    <div id="reader" style="display:none;"></div>

    <input id="siNo" placeholder="Enter SI No">

    <button id="scanBtn" class="btn-blue" onclick="toggleScan()">📷 START SCAN</button>
    <button class="btn-blue" onclick="searchSI()">🔍 SEARCH SI</button>
    <button class="btn-orange" onclick="refreshPage()">♻ REFRESH</button>

    <p id="result"></p>
    <div id="searchResult"></div>

  </div>
</div>

<script>

let scanner = null;
let isScanning = false;
let isSaving = false;
let tempCode = "";
let tempSi = "";

const API_URL = "https://script.google.com/macros/s/AKfycbxtAdfb5JDIeoRj0u8A659Kw7Q78fo2gvyPdqA9z2ytul9mA1lr-Jd1jZtP1ld2zFSAdA/exec";

/* ================= LOGIN ================= */
async function login() {
  const pass = document.getElementById("password").value;

  if (!pass) {
    document.getElementById("loginStatus").innerText = "Enter password";
    return;
  }

  document.getElementById("loginStatus").innerText = "Checking...";

  try {
    const res = await fetch(API_URL + "?action=login&password=" + encodeURIComponent(pass));
    const data = await res.json();

    if (data.status === "OK") {
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("app").style.display = "block";
    } else {
      document.getElementById("loginStatus").innerText = "❌ Wrong password";
    }

  } catch (err) {
    document.getElementById("loginStatus").innerText = "Server error";
  }
}


function setUIScanning(state) {
  const btn = document.getElementById("scanBtn");
  const siBox = document.getElementById("siNo");
  const reader = document.getElementById("reader");
  const refreshBtn = document.querySelector(".btn-orange");

  if (state) {
    btn.innerHTML = "⛔ STOP SCANNING";
    siBox.disabled = true;
    reader.style.display = "block";
    refreshBtn.disabled = true;
    refreshBtn.style.opacity = "0.5";
  } else {
    btn.innerHTML = "📷 START SCAN";
    siBox.disabled = false;
    reader.style.display = "none";
    refreshBtn.disabled = false;
    refreshBtn.style.opacity = "1";
  }
}



async function toggleScan() {
  const siNo = document.getElementById("siNo").value;
  if (!siNo) return alert("Enter SI No");

  if (isScanning) {
    isScanning = false;
    setUIScanning(false);
    if (scanner) {
      await scanner.stop();
      await scanner.clear();
      scanner = null;
    }
    return;
  }

  clearUI();
  isScanning = true;
  setUIScanning(true);

  const devices = await Html5Qrcode.getCameras();
  let cameraId = devices[0].id;

  for (let d of devices) {
    const label = (d.label || "").toLowerCase();
    if (label.includes("back") || label.includes("rear")) {
      cameraId = d.id;
      break;
    }
  }

  scanner = new Html5Qrcode("reader");

  await scanner.start(
    cameraId,
    { fps: 10, qrbox: 250 },
    async (code) => {

      if (!isScanning) return;

      isScanning = false;
      await scanner.stop();
      await scanner.clear();
      scanner = null;
      setUIScanning(false);

      beep();
      vibrate();

      tempCode = code;
      tempSi = siNo;

      const res = await fetch(API_URL + "?action=check&barcode=" + encodeURIComponent(code));
      const data = await res.json();

      let row = data.row || [];
      let colJ = data.colJ || row?.[9] || "";
      let colO = data.colO || row?.[14] || "";

      if (data.status === "FOUND") {
        document.getElementById("result").innerHTML = `
          <div class="card green scan-animate">
            ✅ AVAILABLE<br><br>
            <b>${colO}</b><br>
            ${colJ ? `<small>${colJ}</small><br>` : ""}
            <b>${code}</b><br>
            <br>
            <button id="saveBtn" class="btn-blue" onclick="saveYes()">ADD TO SOLD</button>
            <button class="btn-orange" onclick="cancelNo()">CANCEL</button>
          </div>
        `;
      }

     else if (data.status === "DUPLICATE") {
  document.getElementById("result").innerHTML = `
    <div class="card red">
      🛑 ALREADY SOLD<br><br>
      <b>${colO}</b><br>
      ${colJ ? `<small>${colJ}</small><br>` : ""}
      <b>${code}</b>
    </div>
  `;
}

      else {
        document.getElementById("result").innerHTML = `
          <div class="no-results">
            ❌ NOT FOUND </div><br>
            <b>${colO}</b><br>
            ${colJ ? `<small>${colJ}</small>` : ""}
         
        `;
      }
    }
  );
}

async function saveYes() {
  if (isSaving) return;
  isSaving = true;

  document.getElementById("saveBtn").disabled = true;
  document.getElementById("result").innerHTML = `
  <div class="card saving">
    <div class="spinner"></div>
    <div class="saving-text">Saving data...</div>
  </div>
`;

  const res = await fetch(API_URL +
    "?action=save&barcode=" + encodeURIComponent(tempCode) +
    "&siNo=" + encodeURIComponent(tempSi));

  const data = await res.json();

  let row = data.row || [];
  let colJ = data.colJ || row?.[9] || "";
  let colO = data.colO || row?.[14] || "";

  document.getElementById("result").innerHTML = `
    <div class="card green scan-animate">
  <div>✅ ${data.status}</div>
  <br>

  <b style="font-size:16px;">${colO}</b><br>

  ${colJ ? `<small style="color:#666;">${colJ}</small><br>` : ""}

  <div style="margin-top:12px; font-size:14px; letter-spacing:1px;">
    🏷️ ${tempCode}
  </div>
</div>
  `;

  isSaving = false;
}

async function searchSI() {
  clearUI();

  const siNo = document.getElementById("siNo").value;

  const res = await fetch(API_URL + "?action=searchSI&siNo=" + encodeURIComponent(siNo));
  const data = await res.json();

  const out = document.getElementById("searchResult");

  if (!data.items?.length) {
    out.innerHTML = `
  <div class="no-results">
    ❌ No results found
  </div>
`;
    return;
  }

  out.innerHTML = data.items.map((item, idx) => `
    <div class="card">
      #${idx + 1}<br>
      <b>${item.colO}</b><br>
      ${item.colJ ? `<small>${item.colJ}</small><br>` : ""}
      ${item.barcode}
    </div>
  `).join("");
}

/* ================= UTIL ================= */

function clearUI() {
  document.getElementById("result").innerHTML = "";
  document.getElementById("searchResult").innerHTML = "";
}

function cancelNo() {
  document.getElementById("result").innerHTML = `
  <div class="no-results">
    ❌ CANCELLED
  </div>
`;
}

function refreshPage() {
  document.getElementById("siNo").value = "";
  clearUI();
}



let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function beep() {
  initAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "square";
  osc.frequency.value = 900;
  gain.gain.value = 0.15;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.12);
}

function vibrate() {
  if (navigator.vibrate) navigator.vibrate([150, 80, 150]);
}

document.addEventListener("click", initAudio, { once: true });

</script>

</body>
</html>

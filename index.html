<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #eef2f7;
}

.header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 12px;
  background: linear-gradient(135deg, #2196f3, #1976d2);
  color: white;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.header img {
  width: 40px;
  height: 40px;
  background: white;
  border-radius: 8px;
  padding: 3px;
}

.container { padding: 15px; }

#reader {
  width: 100%;
  max-width: 360px;
  margin: auto;
  border-radius: 15px;
  overflow: hidden;
}

input {
  padding: 14px;
  width: 100%;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  margin-top: 12px;
}

button {
  padding: 14px;
  width: 100%;
  margin-top: 10px;
  border: none;
  border-radius: 14px;
  font-weight: bold;
  cursor: pointer;
}

.btn-blue {
  background: linear-gradient(135deg, #2196f3, #1976d2);
  color: white;
}

.btn-orange {
  background: linear-gradient(135deg, #ff7043, #ff5722);
  color: white;
}

.card {
  padding: 15px;
  border-radius: 15px;
  margin-top: 12px;
  background: white;
}

.green { border-left: 6px solid #2ecc71; }
.red { border-left: 6px solid #e74c3c; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#eef2f7;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999;">
  <h2>🔐 SYSTEM LOGIN</h2>
  <input id="password" type="password" placeholder="Enter Password" style="padding:14px;width:80%;max-width:300px;border-radius:10px;border:none;">
  <button class="btn-blue" style="width:80%;max-width:300px;" onclick="login()">LOGIN</button>
  <p id="loginStatus"></p>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="header">
    <img src="https://drive.google.com/thumbnail?id=1tOeVr8yecFf_REL9zHznEh9Qs2clqVrt&sz=w200">
    <h3>GAISANO ILOILO</h3>
  </div>

  <div class="container">

    <div id="reader" style="display:none;"></div>

    <input id="siNo" placeholder="Enter SI No">

    <button class="btn-blue" onclick="toggleScan()">📷 START SCAN</button>
    <button class="btn-blue" onclick="searchSI()">🔍 SEARCH SI</button>
    <button class="btn-orange" onclick="refreshPage()">♻ REFRESH</button>

    <p id="result">Ready</p>
    <div id="searchResult"></div>

  </div>
</div>

<script>

let sessionToken = "";
let scanner = null;
let isScanning = false;
let isSaving = false;
let tempCode = "";
let tempSi = "";

const API_URL = "https://script.google.com/macros/s/AKfycbzs2r_3C9Pg-XySX1SVJ9XNAqPW5V56j7I2yFOHs7M6bA1bhuO4mJSmRybUD64V54HE5w/exec";

/* ================= LOGIN ================= */
async function login() {
  const pass = document.getElementById("password").value;

  const res = await fetch(API_URL + "?action=login&password=" + encodeURIComponent(pass));
  const data = await res.json();

  if (data.status === "OK") {
    sessionToken = data.token;
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    document.getElementById("loginStatus").innerText = "❌ Wrong password";
  }
}

/* ================= SCAN ================= */
async function toggleScan() {
  const siNo = document.getElementById("siNo").value;
  if (!siNo) return alert("Enter SI No");

  if (isScanning) {
    isScanning = false;
    if (scanner) {
      await scanner.stop();
      await scanner.clear();
      scanner = null;
    }
    return;
  }

  isScanning = true;

  const devices = await Html5Qrcode.getCameras();
  let cameraId = devices[0].id;

  scanner = new Html5Qrcode("reader");

  await scanner.start(
    cameraId,
    { fps: 10, qrbox: 250 },
    async (code) => {

      if (!isScanning) return;

      isScanning = false;
      await scanner.stop();
      await scanner.clear();
      scanner = null;

      beep();
      vibrate();

      tempCode = code;
      tempSi = siNo;

      const res = await fetch(
        API_URL +
        "?action=check" +
        "&token=" + encodeURIComponent(sessionToken) +
        "&barcode=" + encodeURIComponent(code)
      );

      const data = await res.json();

      document.getElementById("result").innerHTML =
        data.status === "FOUND"
        ? `<div class="card green">✔ FOUND<br>${code}<br><button onclick="saveYes()">SAVE</button></div>`
        : `<div class="card red">❌ ${data.status}</div>`;
    }
  );
}

/* ================= SAVE ================= */
async function saveYes() {
  if (isSaving) return;
  isSaving = true;

  document.getElementById("result").innerHTML = "⏳ Saving...";

  const res = await fetch(
    API_URL +
    "?action=save" +
    "&token=" + encodeURIComponent(sessionToken) +
    "&barcode=" + encodeURIComponent(tempCode) +
    "&siNo=" + encodeURIComponent(tempSi)
  );

  const data = await res.json();

  document.getElementById("result").innerHTML =
    `<div class="card green">✅ ${data.status}</div>`;

  isSaving = false;
}

/* ================= SEARCH ================= */
async function searchSI() {
  const siNo = document.getElementById("siNo").value;

  const res = await fetch(
    API_URL +
    "?action=searchSI" +
    "&token=" + encodeURIComponent(sessionToken) +
    "&siNo=" + encodeURIComponent(siNo)
  );

  const data = await res.json();

  document.getElementById("searchResult").innerHTML =
    JSON.stringify(data.items || []);
}

/* ================= UTIL ================= */
function refreshPage() {
  document.getElementById("siNo").value = "";
  document.getElementById("result").innerHTML = "Ready";
}

/* ================= SOUND ================= */
let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function beep() {
  initAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "square";
  osc.frequency.value = 900;
  gain.gain.value = 0.15;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.12);
}

function vibrate() {
  if (navigator.vibrate) navigator.vibrate([150, 80, 150]);
}

document.addEventListener("click", initAudio, { once: true });

</script>

</body>
</html>

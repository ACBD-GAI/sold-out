<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>

body {
    font-family: Arial;
    margin: 0;
    background: #eef2f7;
}

.header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 12px;
    background: linear-gradient(135deg,#2196f3,#1976d2);
    color: white;
    position: sticky;
    top: 0;
}

.header img {
    width: 40px;
    height: 40px;
    background: white;
    border-radius: 8px;
    padding: 3px;
}

.container {
    padding: 15px;
}

#reader {
    width: 100%;
    max-width: 360px;
    margin: auto;
}

input {
    padding: 14px;
    width: 100%;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    margin-top: 12px;
}

button {
    padding: 14px;
    width: 100%;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
}

.btn-blue { background:#1976d2;color:white; }
.btn-orange { background:#ff5722;color:white; }

.card {
    padding: 15px;
    background: white;
    margin-top: 10px;
    border-radius: 12px;
}

.green { border-left:5px solid green; }
.red { border-left:5px solid red; }

</style>
</head>

<body>

<div class="header">
    <img src="https://drive.google.com/thumbnail?id=1tOeVr8yecFf_REL9zHznEh9Qs2clqVrt&sz=w200">
    <h3>SCAN ITEM SYSTEM</h3>
</div>

<div class="container">

    <div id="reader"></div>

    <input id="siNo" placeholder="Enter SI No">

    <button class="btn-blue" onclick="startScan()">START SCAN</button>
    <button class="btn-blue" onclick="searchSI()">SEARCH SI</button>
    <button class="btn-orange" onclick="refreshPage()">REFRESH</button>

    <p id="result">Ready</p>
    <div id="searchResult"></div>

</div>

<script>

let scanner=null;
let isScanning=false;
let isSaving=false;

let tempCode="";
let tempSi="";

/* CHANGE THIS */
const API_URL="https://script.google.com/macros/s/AKfycbzFmz2Lu8i2sD8mTx87Y5oYi_pAKFKehlkczdDFOYVaLurLimFa6VAIKiN0B42nhyTRPQ/exec";

/* HELPERS */
function buildDetails(row){
    let j=row[9]||"";
    let m=row[12]||"";
    let o=row[14]||"";
    let html="";
    if(j)html+=`<b>J:</b>${j}<br>`;
    if(m)html+=`<b>M:</b>${m}<br>`;
    if(o)html+=`<b>Desc:</b>${o}<br>`;
    return html;
}

/* SCAN */
async function startScan(){

    const siNo=document.getElementById("siNo").value;
    if(!siNo)return alert("Enter SI No");

    const devices=await Html5Qrcode.getCameras();
    let cam=devices[0].id;

    for(let d of devices){
        if((d.label||"").toLowerCase().includes("back")){
            cam=d.id;break;
        }
    }

    scanner=new Html5Qrcode("reader");

    await scanner.start(cam,{fps:10,qrbox:250},async(code)=>{

        if(isScanning)return;
        isScanning=true;

        await scanner.stop();
        await scanner.clear();

        tempCode=code;
        tempSi=siNo;

        const res=await fetch(API_URL+
        "?action=check&barcode="+code);

        const data=await res.json();
        let row=data.row||[];

        if(data.status==="FOUND"){

            document.getElementById("result").innerHTML=`
            <div class="card green">
                AVAILABLE<br><br>
                ${buildDetails(row)}

                <button onclick="saveYes()" class="btn-blue">SAVE</button>
            </div>`;
        }

        else if(data.status==="DUPLICATE"){
            document.getElementById("result").innerHTML=`
            <div class="card red">
                ALREADY SOLD<br><br>
                ${buildDetails(row)}
            </div>`;
        }

        else{
            document.getElementById("result").innerHTML="NOT FOUND";
        }

        isScanning=false;
    });
}

/* SAVE */
async function saveYes(){

    if(isSaving)return;
    isSaving=true;

    const res=await fetch(API_URL+
    "?action=save&barcode="+tempCode+
    "&siNo="+tempSi);

    const data=await res.json();

    document.getElementById("result").innerHTML=`
    <div class="card green">
        ${data.status}
    </div>`;

    isSaving=false;
}

/* SEARCH */
async function searchSI(){

    const siNo=document.getElementById("siNo").value;

    const res=await fetch(API_URL+
    "?action=searchSI&siNo="+siNo);

    const data=await res.json();

    document.getElementById("searchResult").innerHTML=
    (data.items||[]).map((i,x)=>`
        <div class="card">
            #${x+1}<br>
            ${i.colJ?`J:${i.colJ}<br>`:""}
            ${i.colM?`M:${i.colM}<br>`:""}
            ${i.colO?`O:${i.colO}<br>`:""}
            ${i.barcode}
        </div>
    `).join("");
}

/* REFRESH */
function refreshPage(){
    document.getElementById("siNo").value="";
    document.getElementById("result").innerHTML="Ready";
    document.getElementById("searchResult").innerHTML="";
}

</script>

</body>
</html>

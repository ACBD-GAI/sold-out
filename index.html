<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 15px;
    background: #f4f6f8;
}

h2 { font-size: 22px; }

#reader {
    width: 100%;
    max-width: 350px;
    margin: auto;
}

button {
    padding: 14px;
    font-size: 16px;
    margin-top: 10px;
    width: 90%;
    background: #1976d2;
    color: white;
    border: none;
    border-radius: 8px;
}

button:disabled { background: gray; }

#result, #searchResult {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>SCAN ITEM QR</h2>

<div id="reader"></div>

<input id="siNo" placeholder="Enter SI No"
style="padding:12px;width:85%;font-size:16px;margin-top:5px;">

<button onclick="startScan()">START SCAN</button>
<button onclick="searchSI()">SEARCH SI NO</button>
<button onclick="refreshPage()" style="background:#ff9800;">REFRESH</button>

<p id="result">Ready</p>
<div id="searchResult"></div>

<script>

let scanner = null;
let isScanning = false;

const API_URL = "https://script.google.com/macros/s/AKfycbyE6rAFE7Q1f3wkAEnNdiI17pW51CQLsM6TtHXzSU5Nk6t5QadWmA9ZXkUOPciXerG5/exec";


// ================= SCAN =================
async function startScan() {

    const siNo = document.getElementById("siNo").value.trim();
    const result = document.getElementById("result");

    if (!siNo) return result.innerHTML = "⚠ Enter SI No";

    if (scanner) { await scanner.stop(); scanner.clear(); scanner = null; }

    const devices = await Html5Qrcode.getCameras();
    const cam = devices[0].id;

    scanner = new Html5Qrcode("reader");

    scanner.start(cam, { fps: 10, qrbox: 250 }, async (code) => {

        if (isScanning) return;
        isScanning = true;

        const res = await fetch(API_URL + "?barcode=" + code + "&siNo=" + siNo);
        const data = await res.json();

        let lens = data.colJ;
        let desc = data.colO;

        let details = "";

        if (lens && lens.trim() !== "") {
            details = `Lens: ${lens}<br>Description: ${desc}`;
        } else {
            details = `Description: ${desc}`;
        }

        let time = data.timestamp ? new Date(data.timestamp).toLocaleString() : "";

        if (data.status === "DUPLICATE") {
            result.innerHTML = `⚠ DUPLICATE<br>${details}<br>SI: ${data.siNo}<br>${time}`;
        }
        else if (data.status === "FOUND") {
            result.innerHTML = `✅ SCANNED<br>${details}<br>${time}`;
        }
        else {
            result.innerHTML = "❌ NOT FOUND";
        }

        isScanning = false;

    });

}


// ================= SEARCH =================
async function searchSI() {

    const siNo = document.getElementById("siNo").value;
    const out = document.getElementById("searchResult");

    const res = await fetch(API_URL + "?action=searchSI&siNo=" + siNo);
    const data = await res.json();

    if (!data.items.length) return out.innerHTML = "No results";

    let html = `<b>SI:</b> ${siNo}<br><br>`;

    data.items.forEach((i, index) => {

        let lens = i.lens;
        let desc = i.grade;

        html += `<div style="border:1px solid #ccc;padding:8px;margin:5px;">
        #${index+1}<br>`;

        if (lens) html += `Lens: ${lens}<br>`;
        html += `Description: ${desc}<br>
        Barcode: ${i.barcode}
        </div>`;
    });

    out.innerHTML = html;
}


// ================= REFRESH =================
function refreshPage() {
    document.getElementById("siNo").value = "";
    document.getElementById("result").innerHTML = "Ready";
    document.getElementById("searchResult").innerHTML = "";

    if (scanner) {
        scanner.stop();
        scanner.clear();
        scanner = null;
    }
}

</script>

</body>
</html>
